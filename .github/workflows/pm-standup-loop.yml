# Scheduled standup artifact upload. If Actions env or secrets confuse you, see Project-Manager/docs/operator-friction-log.md.
name: PM Standup Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * 1-5"

jobs:
  standup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Project-Manager
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate standup artifacts
        run: python3 scripts/run_pm_standup.py

      - name: Upload standup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pm-standup-artifacts
          path: Project-Manager/docs/session-artifacts/standup/
